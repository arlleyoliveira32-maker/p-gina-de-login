<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Digital Nacional - Login</title>
    <link rel="stylesheet" href="stylelogin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="interface-principal">
  
  <aside class="lado-imagem">
    <div class="texto-marketing">
        <h1>Conhecimento sem limites.</h1>
        <p>O portal oficial para sua pesquisa acadêmica.</p>
    </div>
  </aside>

  <main class="lado-formulario">
    <div class="cartao-login">
      <h2>Acesse sua Conta</h2>
      
      <div class="caixa-entrada">
        <label for="estudante">E-mail do Aluno</label>
        <input type="email" id="estudante" placeholder="EX: nome@faculdade.com">
      </div>

      <div class="caixa-entrada">
        <label for="senha">Senha de Acesso</label>
        <input type="password" id="senha" placeholder="••••••••">
      </div>

      <button class="botao-acesso">ENTRAR NO ACERVO</button>

      <footer class="rodape-projeto">
        <p>© 2026 Biblioteca Digital Nacional. <br> Todos os direitos reservados.</p>
      </footer>
    </div>
  </main>

</div>

</body>
</html>
